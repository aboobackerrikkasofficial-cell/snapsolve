name: Bug Report
description: Report a bug to help us improve SnapSolve.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: |
        Steps to reproduce the behavior:
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Device model, OS version, Flutter version, etc.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant logs here.
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Checkbox
      options:
        - label: I have verified this is not a duplicate issue.
          required: true
