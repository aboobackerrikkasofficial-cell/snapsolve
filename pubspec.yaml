name: snapsolve_ai
description: "SnapSolve — AI-powered screen diagnostic tool. Upload any screenshot and get instant, step-by-step fixes powered by advanced AI."
version: 1.0.1+2
homepage: https://snapsolve.ai
repository: https://github.com/snapsolve/snapsolve-ai
issue_tracker: https://github.com/snapsolve/snapsolve-ai/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.1
  image_picker: ^1.0.7
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  intl: ^0.18.1
  flutter_localizations:
    sdk: flutter
  path_provider: ^2.1.2
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0
  google_generative_ai: ^0.4.7
  image: ^4.2.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+4
  path: ^1.8.3
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  email_validator: ^2.1.1
  photo_view: ^0.15.0
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/l10n/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#0F172A"
  image: "assets/images/logo.png"
  android: true
  ios: true

